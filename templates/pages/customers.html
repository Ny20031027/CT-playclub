{% extends 'layout.html' %}

{% block content %}
<script>
    document.getElementById('pageTitle').textContent = '客户管理';
</script>

<div class="card">
    <div class="card-header">
        <div class="card-title">客户列表</div>
        <div class="card-actions">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索昵称/手机号">
            <button class="btn btn-primary" onclick="showModal('addCustomerModal')">
                <i class="fa-solid fa-plus"></i> 添加客户
            </button>
        </div>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>头像</th>
                    <th>昵称</th>
                    <th>手机号</th>
                    <th>等级</th>
                    <th>消费金额</th>
                    <th>订单数</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="customerList">
                <tr><td colspan="9" class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><br>加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="addCustomerModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">添加客户</div>
            <div class="modal-close" onclick="hideModal('addCustomerModal')">&times;</div>
        </div>
        <div class="modal-body">
            <form id="addCustomerForm">
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="custNickname" required>
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="custPhone">
                </div>
                <div class="form-group">
                    <label>等级</label>
                    <select id="custLevel">
                        <option value="normal">普通会员</option>
                        <option value="vip">VIP会员</option>
                        <option value="svip">SVIP会员</option>
                    </select>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-default" onclick="hideModal('addCustomerModal')">取消</button>
            <button class="btn btn-primary" onclick="addCustomer()">确定</button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async function() {
        await loadCustomers();
        
        document.getElementById('searchInput').addEventListener('input', debounce(async function() {
            await loadCustomers();
        }, 300));
    });

    async function loadCustomers() {
        const keyword = document.getElementById('searchInput').value;
        try {
            const result = await get('/customer/customers/', { keyword });
            if (result.code === 200) {
                const customers = result.data.results || [];
                const tbody = document.getElementById('customerList');
                
                if (customers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="empty-state"><i class="fa-solid fa-inbox"></i><br>暂无数据</td></tr>';
                    return;
                }
                
                tbody.innerHTML = customers.map(cust => `
                    <tr>
                        <td>${cust.id}</td>
                        <td>${avatarHtml(cust, 40)}</td>
                        <td>${cust.nickname || '-'}</td>
                        <td>${cust.phone || '-'}</td>
                        <td><span class="badge ${getLevelBadge(cust.level)}">${getLevelText(cust.level)}</span></td>
                        <td>¥${formatMoney(cust.total_spent)}</td>
                        <td>${cust.order_count || 0}</td>
                        <td><span class="badge ${cust.is_active ? 'badge-success' : 'badge-danger'}">${cust.is_active ? '正常' : '禁用'}</span></td>
                        <td>
                            <button class="btn btn-default" onclick="viewCustomer(${cust.id})">查看</button>
                            <button class="btn btn-danger" onclick="deleteCustomer(${cust.id})">删除</button>
                        </td>
                    </tr>
                `).join('');
            }
        } catch (error) {
            console.error('加载客户数据失败:', error);
        }
    }

    function getLevelText(level) {
        const map = {
            'normal': '普通会员',
            'vip': 'VIP会员',
            'svip': 'SVIP会员'
        };
        return map[level] || level;
    }

    function getLevelBadge(level) {
        const map = {
            'normal': 'badge-info',
            'vip': 'badge-warning',
            'svip': 'badge-success'
        };
        return map[level] || 'badge-info';
    }

    async function addCustomer() {
        const nickname = document.getElementById('custNickname').value;
        const phone = document.getElementById('custPhone').value;
        const level = document.getElementById('custLevel').value;
        
        try {
            const result = await post('/customer/customers/', { nickname, phone });
            
            if (result.code === 200) {
                showToast('添加成功', 'success');
                hideModal('addCustomerModal');
                document.getElementById('addCustomerForm').reset();
                await loadCustomers();
            } else {
                showToast(result.msg, 'error');
            }
        } catch (error) {
            showToast(error.message, 'error');
        }
    }

    async function deleteCustomer(id) {
        if (!confirm('确定要删除该客户吗？')) return;
        
        try {
            const result = await del(`/customer/customers/${id}/`);
            if (result.code === 200) {
                showToast('删除成功', 'success');
                await loadCustomers();
            } else {
                showToast(result.msg, 'error');
            }
        } catch (error) {
            showToast(error.message, 'error');
        }
    }

    function viewCustomer(id) {
        showToast('查看详情功能开发中', 'info');
    }
</script>
{% endblock %}
